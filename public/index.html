<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valorant Overlay</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tungsten', sans-serif; }
        @import url('https://fonts.cdnfonts.com/css/tungsten');
        html, body { background: transparent !important; height: 100%; overflow: hidden; color: white; }
        .overlay-container {
            width: 550px; height: 280px; background: rgba(15, 25, 35, 0.7);
            border-radius: 8px; border: 1px solid rgba(255, 70, 85, 0.4);
            display: flex; flex-direction: column; padding: 0;
        }
        .section-title {
            background: rgba(10, 15, 25, 0.8); padding: 10px 20px;
            font-size: 24px; color: #ff4655; text-transform: uppercase;
            border-bottom: 1px solid rgba(255, 70, 85, 0.2);
        }
        .content { flex: 1; padding: 20px; position: relative; }
        .agent-row { display: flex; gap: 10px; justify-content: center; height: 80px; margin-bottom: 20px; }
        .agent-card { width: 60px; display: flex; flex-direction: column; align-items: center; }
        .agent-card img { width: 60px; height: 60px; border: 2px solid #333; border-radius: 5px; background: #111; }
        .res-bar { width: 100%; height: 5px; margin-top: 5px; border-radius: 2px; }
        .Victory { background: #2ecc71; box-shadow: 0 0 10px #2ecc71; }
        .Defeat { background: #ff4655; box-shadow: 0 0 10px #ff4655; }
        .Draw { background: #ccc; }
        .stats-area { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
        .rank-box { display: flex; align-items: center; gap: 15px; }
        #rank-icon { width: 80px; height: 80px; }
        .stat-grid { display: flex; flex-direction: column; gap: 5px; text-align: right; min-width: 150px; }
        .stat-val { font-size: 32px; font-weight: bold; line-height: 1; }
        .stat-lbl { font-size: 16px; color: #aaa; text-transform: uppercase; }
        .active-set { display: block; }
        .hidden-set { display: none; }
    </style>
</head>
<body>
    <div class="overlay-container">
        <div class="section-title"><i class="fas fa-ghost"></i> Competitive Session</div>
        <div class="content">
            <div class="agent-row" id="agents"></div>
            <div class="stats-area">
                <div class="rank-box">
                    <img id="rank-icon" src="" alt="">
                    <div>
                        <div id="rank-name" style="font-size: 28px; font-weight: bold;">---</div>
                        <div style="font-size: 16px; color: #aaa;">CURRENT RANK</div>
                    </div>
                </div>
                <div class="stat-grid" id="set1">
                    <div><div class="stat-lbl">Win Rate</div><div id="winrate" class="stat-val" style="color: #2ecc71;">0%</div></div>
                    <div><div class="stat-lbl">K/D Ratio</div><div id="kd" class="stat-val" style="color: #ff4655;">0.00</div></div>
                </div>
                <div class="stat-grid hidden-set" id="set2">
                    <div><div class="stat-lbl">Headshot %</div><div id="hs" class="stat-val" style="color: #4cc9f0;">0%</div></div>
                    <div><div class="stat-lbl">Session W/L</div><div id="wl" class="stat-val" style="color: #f1c40f;">0-0</div></div>
                </div>
            </div>
        </div>
    </div>

<script>
    const params = new URLSearchParams(window.location.search);
    const user = { 
        reg: params.get('region') || 'eu', 
        name: params.get('name') || '', 
        tag: params.get('tag') || '',
        date: params.get('date') || '' 
    };

    const agentIds = { 'Gekko': 'e370fa57-4757-3604-3648-499e1f642d3f', 'Fade': 'dade69b4-4f5a-8528-247b-219e5a1facd6', 'Breach': '5f8d3a7f-467b-97f3-062c-13acf203c006', 'Deadlock': 'cc8b64c8-4b25-4ff9-6e7f-37b4da43d235', 'Raze': 'f94c3b30-42be-e959-889c-5aa313dba261', 'Chamber': '22697a3d-45bf-8dd7-4fec-84a9e28c69d7', 'KAY/O': '601dbbe7-43ce-be57-2a40-4abd24953621', 'Skye': '6f2a04ca-43e0-be17-7f36-b3908627744d', 'Cypher': '117ed9e3-49f3-6512-3ccf-0cada7e3823b', 'Sova': '320b2a48-4d9b-a075-30f1-1f93a9b638fa', 'Killjoy': '1e58de9c-4950-5125-93e9-a0aee9f98746', 'Harbor': '95b78ed7-4637-86d9-7e41-71ba8c293152', 'Viper': '707eab51-4836-f488-046a-cda6bf494859', 'Phoenix': 'eb93336a-449b-9c1b-0a54-a891f7921d69', 'Astra': '41fb69c1-4189-7b37-f117-bcaf1e96f1bf', 'Brimstone': '9f0d8ba9-4140-b941-57d3-a7ad57c6b417', 'Iso': '0e38b510-41a8-5780-5e8f-568b2a4f2d6c', 'Neon': 'bb2a4828-46eb-8cd1-e765-15848195d751', 'Yoru': '7f94d92c-4234-0a36-9646-3a87eb8b5c89', 'Sage': '569fdd95-4d10-43ab-ca70-79becc718b46', 'Reyna': 'a3bfb853-43b2-7238-a4f1-ad90e9e46bcc', 'Omen': '8e253930-4c05-31dd-1b6c-968525494517', 'Jett': 'add6443a-41bd-e414-f6ad-e58d267f4e95', 'Clove': '1dbf2edd-4729-0984-3115-daa5eed44993', 'Tejo': 'b444168c-4e35-8076-db47-ef9bf368f384', 'Vyse': 'efba5359-4016-a1e5-7626-b1ae76895940', 'Waylay': 'df1cb487-4902-002e-5c17-d28e83e78588' };
    const rankIcons = { 'Iron 1': '3.png', 'Iron 2': '4.png', 'Iron 3': '5.png', 'Bronze 1': '6.png', 'Bronze 2': '7.png', 'Bronze 3': '8.png', 'Silver 1': '9.png', 'Silver 2': '10.png', 'Silver 3': '11.png', 'Gold 1': '12.png', 'Gold 2': '13.png', 'Gold 3': '14.png', 'Platinum 1': '15.png', 'Platinum 2': '16.png', 'Platinum 3': '17.png', 'Diamond 1': '18.png', 'Diamond 2': '19.png', 'Diamond 3': '20.png', 'Ascendant 1': '21.png', 'Ascendant 2': '22.png', 'Ascendant 3': '23.png', 'Immortal 1': '24.png', 'Immortal 2': '25.png', 'Immortal 3': '26.png', 'Radiant': '27.png', 'Unranked': '0.png' };

    async function update() {
        if(!user.name) return;
        try {
            let url = `/api/stats?region=${user.reg}&name=${user.name}&tag=${user.tag}`;
            if(user.date) url += `&date=${user.date}`;
            
            const res = await fetch(url);
            const data = await res.json();
            if(!data.matches || data.matches.length === 0) return;

            const matches = data.matches;
            const latest = matches[0];

            document.getElementById('rank-name').innerText = latest.rank;
            const iconId = rankIcons[latest.rank] || '0.png';
            document.getElementById('rank-icon').src = `https://trackercdn.com/cdn/tracker.gg/valorant/icons/tiersv2/${iconId}`;

            document.getElementById('agents').innerHTML = matches.slice(0, 7).map(m => `
                <div class="agent-card">
                    <img src="https://media.valorant-api.com/agents/${agentIds[m.agent] || 'displayicon'}/displayicon.png">
                    <div class="res-bar ${m.result}"></div>
                </div>
            `).join('');

            const wins = matches.filter(m => m.result === 'Victory').length;
            document.getElementById('winrate').innerText = Math.round((wins / matches.length) * 100) + '%';
            
            let k = 0, d = 0, hs = 0, b = 0, l = 0;
            matches.forEach(m => { k += m.kills; d += m.deaths; hs += m.headshots; b += m.bodyshots; l += m.legshots; });
            document.getElementById('kd').innerText = (k / (d || 1)).toFixed(2);
            document.getElementById('hs').innerText = Math.round((hs / (hs + b + l || 1)) * 100) + '%';

            const today = new Date().toLocaleDateString('en-CA');
            const dayMatches = matches.filter(m => new Date(m.timestamp * 1000).toLocaleDateString('en-CA') === today);
            const dW = dayMatches.filter(m => m.result === 'Victory').length;
            const dL = dayMatches.filter(m => m.result === 'Defeat').length;
            document.getElementById('wl').innerText = `${dW}-${dL}`;

        } catch (e) { console.log(e); }
    }

    setInterval(() => {
        document.getElementById('set1').classList.toggle('hidden-set');
        document.getElementById('set2').classList.toggle('hidden-set');
    }, 10000);

    update();
    setInterval(update, 60000);
</script>
</body>
</html>
