<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valorant Performance Overlay</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tungsten', 'Segoe UI', sans-serif; }
        @import url('https://fonts.cdnfonts.com/css/tungsten');
        html, body { background: transparent !important; height: 100%; overflow: hidden; }
        .overlay-container {
            position: relative; width: 550px; height: 280px; display: flex; flex-direction: column;
            background: rgba(15, 25, 35, 0.50); border-radius: 8px; border: 1px solid rgba(255, 70, 85, 0.3);
        }
        .section-title {
            display: flex; justify-content: space-between; align-items: center; height: 40px;
            padding: 0 20px; color: #ff4655; font-size: 22px; text-transform: uppercase;
            background: rgba(10, 15, 25, 0.5); border-bottom: 1px solid rgba(255, 70, 85, 0.2);
        }
        .content-area { flex: 1; display: flex; padding: 15px 20px; position: relative; }
        .agent-row {
            display: flex; gap: 12px; height: 85px; position: absolute; top: 15px; left: 20px; right: 20px; justify-content: center;
        }
        .agent-portrait { display: flex; flex-direction: column; align-items: center; min-width: 60px; }
        .agent-icon {
            width: 60px; height: 60px; border-radius: 8px; border: 2px solid rgba(45, 55, 72, 0.9);
            background: linear-gradient(135deg, rgba(42, 67, 101, 0.9), rgba(74, 85, 104, 0.9));
        }
        .agent-icon img { width: 100%; height: 100%; object-fit: cover; }
        .match-result-bar { width: 100%; height: 4px; border-radius: 2px; margin-top: 6px; }
        .win-bar { background: #2ecc71; } .loss-bar { background: #ff4655; } .draw-bar { background: #f1c40f; }
        .stats-section { display: flex; height: 120px; position: absolute; bottom: 15px; left: 20px; right: 20px; }
        .rank-section { flex: 2; display: flex; gap: 12px; align-items: center; position: relative; }
        .rank-badge { width: 100px; height: 100px; border-radius: 50%; display: flex; justify-content: center; align-items: center; }
        .rank-badge img { width: 90%; height: 90%; object-fit: contain; }
        .rank-name { font-size: 24px; color: #fff; text-transform: uppercase; }
        .rank-subtitle { font-size: 18px; color: #a9b7c6; text-transform: uppercase; }
        .stats-group { flex: 1; display: flex; flex-direction: column; justify-content: center; padding-left: 25px; position: relative; }
        .stat-set { position: absolute; display: flex; flex-direction: column; gap: 8px; transition: 0.5s; opacity: 0; }
        .stat-set.active { opacity: 1; z-index: 1; }
        .stat-label { font-size: 18px; color: #a9b7c6; text-transform: uppercase; }
        .stat-value { font-size: 28px; font-weight: 700; }
        .win-stat .stat-value { color: #2ecc71; } .kd-stat .stat-value { color: #ff4655; }
        .hs-stat .stat-value { color: #4cc9f0; } .daily-stat .stat-value { color: #f3a712; }
        #message-container { width: 550px; padding: 12px 20px; margin-top: 10px; background: rgba(15, 25, 35, 0.85); color: #ff4655; border-radius: 8px; font-size: 25px; display: none; }
        .indicator-dot { width: 6px; height: 6px; background: rgba(255,255,255,0.3); border-radius: 50%; }
        .indicator-dot.active { background: #ff4655; }
        .stat-indicator { position: absolute; bottom: 5px; right: 10px; display: flex; gap: 4px; }
    </style>
</head>
<body>
    <div class="overlay-container">
        <div class="section-title"><i class="fas fa-user-secret"></i> Recent Agents (Competitive)</div>
        <div class="content-area">
            <div class="agent-row" id="agents-row"></div>
            <div class="stats-section">
                <div class="rank-section">
                    <div class="rank-badge"><img id="rank-icon" src="" alt=""></div>
                    <div class="rank-details">
                        <div class="rank-name" id="rank-name">Loading...</div>
                        <div class="rank-subtitle" id="rank-subtitle">Current Rank</div>
                    </div>
                </div>
                <div class="stats-group">
                    <div class="stat-set set-1 active">
                        <div class="stat-box win-stat"><div class="stat-label">WIN %</div><div class="stat-value" id="win-rate">0%</div></div>
                        <div class="stat-box kd-stat"><div class="stat-label">K/D</div><div class="stat-value" id="kd-ratio">0.00</div></div>
                    </div>
                    <div class="stat-set set-2 inactive">
                        <div class="stat-box hs-stat"><div class="stat-label">HEADSHOT %</div><div class="stat-value" id="hs-percentage">0%</div></div>
                        <div class="stat-box daily-stat"><div class="stat-label">DAILY W/L</div><div class="stat-value" id="daily-wl">0-0</div></div>
                    </div>
                    <div class="stat-indicator">
                        <div class="indicator-dot active" data-set="1"></div>
                        <div class="indicator-dot" data-set="2"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div id="message-container"></div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const player = {
        region: urlParams.get('region') || 'eu',
        name: urlParams.get('name') || 'Player',
        tag: urlParams.get('tag') || '000'
    };

    const agentUUIDs = { 'Sova': '320b2a48-4d9b-a075-30f1-1f93a9b638fa', 'Jett': 'add6443a-41bd-e414-f6ad-e58d267f4e95', 'Reyna': 'a3bfb853-43b2-7238-a4f1-ad90e9e46bcc' /* add others... */ };
    const rankImages = { 'Gold 1': '12.png', 'Platinum 1': '15.png', 'Unranked': '0.png' /* add others... */ };

    async function fetchMatches() {
        try {
            const date = urlParams.get('date');
            let url = `/api/stats?region=${player.region}&name=${player.name}&tag=${player.tag}`;
            if (date) url += `&date=${date}`;

            const res = await fetch(url);
            const data = await res.json();
            if (!data.matches || data.matches.length === 0) throw new Error(date ? 'No matches today' : 'No matches');

            renderAgents(data.matches);
            renderStats(data.matches);
            updateRank(data.matches[0].rank);
        } catch (e) { document.getElementById('agents-row').innerHTML = `<div style="color:red">${e.message}</div>`; }
    }

    function renderAgents(matches) {
        const row = document.getElementById('agents-row');
        row.innerHTML = matches.slice(0, 7).map(m => `
            <div class="agent-portrait">
                <div class="agent-icon"><img src="https://media.valorant-api.com/agents/${agentUUIDs[m.agent] || 'displayicon'}/displayicon.png"></div>
                <div class="match-result-bar ${m.result === 'Victory' ? 'win-bar' : 'loss-bar'}"></div>
            </div>
        `).join('');
    }

    function renderStats(matches) {
        const wins = matches.filter(m => m.result === 'Victory').length;
        document.getElementById('win-rate').innerText = ((wins / matches.length) * 100).toFixed(1) + '%';
        
        let k = 0, d = 0, hs = 0, b = 0, l = 0;
        matches.forEach(m => { k += m.kills; d += m.deaths; hs += m.headshots; b += m.bodyshots; l += m.legshots; });
        
        document.getElementById('kd-ratio').innerText = (k / (d || 1)).toFixed(2);
        document.getElementById('hs-percentage').innerText = ((hs / (hs + b + l || 1)) * 100).toFixed(1) + '%';
        
        const today = new Date().toISOString().split('T')[0];
        const dayMatches = matches.filter(m => new Date(m.timestamp * 1000).toISOString().split('T')[0] === today);
        const dW = dayMatches.filter(m => m.result === 'Victory').length;
        document.getElementById('daily-wl').innerText = `${dW}-${dayMatches.length - dW}`;
    }

    function updateRank(rank) {
        document.getElementById('rank-name').innerText = rank;
        document.getElementById('rank-icon').src = `https://trackercdn.com/cdn/tracker.gg/valorant/icons/tiersv2/${rankImages[rank] || '0.png'}`;
    }

    let currentSet = 1;
    setInterval(() => {
        document.querySelectorAll('.stat-set').forEach(s => s.classList.toggle('active'));
        document.querySelectorAll('.indicator-dot').forEach(d => d.classList.toggle('active'));
    }, 10000);

    fetchMatches();
    setInterval(fetchMatches, 300000);
</script>
</body>
</html>
