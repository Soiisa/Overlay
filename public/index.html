<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valorant Performance Overlay</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tungsten', 'Segoe UI', sans-serif;
        }

        @import url('https://fonts.cdnfonts.com/css/tungsten');
        
        html, body {
            background: rgba(0,0,0,0) !important;
            background-color: transparent !important;
            height: 100%;
            overflow: hidden;
        }

        body > :not(.overlay-container) {
            background: transparent !important;
        }

        .overlay-container {
            position: relative;
            width: 550px;
            height: 280px;
            display: flex;
            flex-direction: column;
            background: rgba(15, 25, 35, 0.50);
            overflow: hidden;
            border-radius: 8px;
            z-index: 2;
            border: 1px solid rgba(255, 70, 85, 0.3);
        }

        .section-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 40px;
            padding: 0 20px;
            color: #ff4655;
            font-size: 22px;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: rgba(10, 15, 25, 0.5);
            border-bottom: 1px solid rgba(255, 70, 85, 0.2);
        }

        .section-title i {
            margin-right: 10px;
            color: #ff4655;
        }

        .content-area {
            flex: 1;
            display: flex;
            padding: 15px 20px;
            position: relative;
        }

        .agent-row {
            display: flex;
            gap: 12px;
            padding: 5px 0;
            overflow-x: auto;
            scrollbar-width: none;
            height: 85px;
            position: absolute;
            top: 15px;
            left: 20px;
            right: 20px;
            justify-content: center;
        }

        .agent-row::-webkit-scrollbar {
            display: none;
        }

        .agent-portrait {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 60px;
            flex-shrink: 0;
            position: relative;
        }

        .agent-icon {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            background: linear-gradient(135deg, rgba(42, 67, 101, 0.9), rgba(74, 85, 104, 0.9));
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border: 2px solid rgba(45, 55, 72, 0.9);
            transition: all 0.3s ease;
        }

        .agent-icon:hover {
            transform: translateY(-3px);
            border-color: rgba(255, 70, 85, 0.7);
        }

        .agent-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .match-result-bar {
            width: 100%;
            height: 4px;
            border-radius: 2px;
            margin-top: 6px;
        }

        .win-bar {
            background: linear-gradient(90deg, rgba(46, 204, 113, 0.9), rgba(39, 174, 96, 0.9));
        }

        .loss-bar {
            background: linear-gradient(90deg, rgba(231, 76, 60, 0.9), rgba(192, 57, 43, 0.9));
        }

        .draw-bar {
            background: linear-gradient(90deg, rgba(241, 196, 15, 0.9), rgba(243, 156, 18, 0.9));
        }

        .stats-section {
            display: flex;
            height: 120px;
            position: absolute;
            bottom: 15px;
            left: 20px;
            right: 20px;
        }

        .rank-section {
            flex: 2;
            display: flex;
            gap: 12px;
            align-items: center;
            position: relative;
            padding-right: 25px;
        }

        .rank-section::after {
            content: '';
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%) skewX(-15deg);
            width: 2px;
            height: 70%;
            background: rgba(255, 255, 255, 0.2);
        }

        .rank-badge {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(255, 142, 77, 0.9), rgba(255, 70, 85, 0.9));
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 22px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
            flex: 0 0 100px;
        }

        .rank-badge img {
            width: 90%;
            height: 90%;
            object-fit: contain;
            border-radius: 50%;
        }

        .rank-details {
            display: flex;
            flex-direction: column;
        }

        .rank-name {
            font-size: 24px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 1px;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .rank-subtitle {
            font-size: 18px;
            color: #a9b7c6;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 3px;
        }

        .stats-group {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 5px;
            padding-left: 25px;
            position: relative;
            height: 100%;
        }

        .stat-set {
            position: absolute;
            top: 0;
            left: 25px;
            right: 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
            transition: all 0.5s ease;
        }

        .stat-set.active {
            opacity: 1;
            transform: translateY(0);
            z-index: 1;
        }

        .stat-set.inactive {
            opacity: 0;
            transform: translateY(10px);
            z-index: 0;
        }

        .stat-box {
            display: flex;
            flex-direction: column;
        }

        .stat-label {
            font-size: 18px;
            color: #a9b7c6;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 1px;
            transition: all 0.3s ease;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            transition: all 0.3s ease;
        }

        .win-stat .stat-value { color: #2ecc71; }
        .kd-stat .stat-value { color: #ff4655; }
        .hs-stat .stat-value { color: #4cc9f0; }
        .daily-stat .stat-value { color: #f3a712; }

        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #ff4655;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(231, 76, 60, 0.2);
            border-radius: 4px;
            padding: 10px 15px;
            text-align: center;
            color: #e74c3c;
            font-size: 12px;
            white-space: nowrap;
        }
        
        .stat-indicator {
            position: absolute;
            bottom: 5px;
            right: 10px;
            display: flex;
            gap: 4px;
        }
        
        .indicator-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
        }
        
        .indicator-dot.active {
            background: #ff4655;
            transform: scale(1.2);
        }

        #message-container {
            width: 550px;
            padding: 12px 20px;
            margin-top: 10px;
            background: rgba(15, 25, 35, 0.85);
            color: #ff0000;
            border-radius: 8px;
            text-align: center;
            font-family: 'Tungsten', 'Segoe UI', sans-serif;
            font-size: 25px;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .no-message { display: none; }

    </style>
</head>
<body>
    <div class="overlay-container">
        <div class="section-title">
            <i class="fas fa-user-secret"></i> Recent Agents (Competitive)
        </div>
        
        <div class="content-area">
            <div class="agent-row" id="agents-row">
                <div class="loading">
                    <div class="spinner"></div>
                </div>
            </div>
            
            <div class="stats-section">
                <div class="rank-section">
                    <div class="rank-badge">
                        <img id="rank-icon" src="https://trackercdn.com/cdn/tracker.gg/valorant/icons/tiersv2/0.png" alt="Rank">
                    </div>
                    <div class="rank-details">
                        <div class="rank-name" id="rank-name">Loading...</div>
                        <div class="rank-subtitle" id="rank-subtitle">Current Rank</div>
                    </div>
                </div>
                
                <div class="stats-group">
                    <div class="stat-set set-1 active">
                        <div class="stat-box win-stat">
                            <div class="stat-label">WIN %</div>
                            <div class="stat-value" id="win-rate">0%</div>
                        </div>
                        
                        <div class="stat-box kd-stat">
                            <div class="stat-label">K/D</div>
                            <div class="stat-value" id="kd-ratio">0.00</div>
                        </div>
                    </div>
                    
                    <div class="stat-set set-2 inactive">
                        <div class="stat-box hs-stat">
                            <div class="stat-label">HEADSHOT %</div>
                            <div class="stat-value" id="hs-percentage">0%</div>
                        </div>
                        
                        <div class="stat-box daily-stat">
                            <div class="stat-label">DAILY W/L</div>
                            <div class="stat-value" id="daily-wl">0-0</div>
                        </div>
                    </div>
                    
                    <div class="stat-indicator">
                        <div class="indicator-dot active" data-set="1"></div>
                        <div class="indicator-dot" data-set="2"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div id="message-container">
        <div class="loading">
            <div class="spinner"></div>
        </div>
    </div>

<script>
  // Player configuration from URL parameters
  const urlParams = new URLSearchParams(window.location.search);
  const player = {
    region: urlParams.get('region') || 'eu',
    name: urlParams.get('name') || 'Player',
    tag: urlParams.get('tag') || '000'
  };
  
  const maxAgentsToShow = 7;
  let currentStatSet = 1;
  let statRotationInterval;
  
  // DOM elements
  const rankName = document.getElementById('rank-name');
  const rankSubtitle = document.getElementById('rank-subtitle');
  const winRate = document.getElementById('win-rate');
  const kdRatio = document.getElementById('kd-ratio');
  const agentsRow = document.getElementById('agents-row');
  const hsPercentage = document.getElementById('hs-percentage');
  const dailyWL = document.getElementById('daily-wl');
  const rankIcon = document.getElementById('rank-icon');
  const messageContainer = document.getElementById('message-container');

  const agentUUIDs = {
      'Gekko': 'e370fa57-4757-3604-3648-499e1f642d3f', 'Fade': 'dade69b4-4f5a-8528-247b-219e5a1facd6',
      'Breach': '5f8d3a7f-467b-97f3-062c-13acf203c006', 'Deadlock': 'cc8b64c8-4b25-4ff9-6e7f-37b4da43d235',
      'Raze': 'f94c3b30-42be-e959-889c-5aa313dba261', 'Chamber': '22697a3d-45bf-8dd7-4fec-84a9e28c69d7',
      'KAY/O': '601dbbe7-43ce-be57-2a40-4abd24953621', 'Skye': '6f2a04ca-43e0-be17-7f36-b3908627744d',
      'Cypher': '117ed9e3-49f3-6512-3ccf-0cada7e3823b', 'Sova': '320b2a48-4d9b-a075-30f1-1f93a9b638fa',
      'Killjoy': '1e58de9c-4950-5125-93e9-a0aee9f98746', 'Harbor': '95b78ed7-4637-86d9-7e41-71ba8c293152',
      'Viper': '707eab51-4836-f488-046a-cda6bf494859', 'Phoenix': 'eb93336a-449b-9c1b-0a54-a891f7921d69',
      'Astra': '41fb69c1-4189-7b37-f117-bcaf1e96f1bf', 'Brimstone': '9f0d8ba9-4140-b941-57d3-a7ad57c6b417',
      'Iso': '0e38b510-41a8-5780-5e8f-568b2a4f2d6c', 'Neon': 'bb2a4828-46eb-8cd1-e765-15848195d751',
      'Yoru': '7f94d92c-4234-0a36-9646-3a87eb8b5c89', 'Sage': '569fdd95-4d10-43ab-ca70-79becc718b46',
      'Reyna': 'a3bfb853-43b2-7238-a4f1-ad90e9e46bcc', 'Omen': '8e253930-4c05-31dd-1b6c-968525494517',
      'Jett': 'add6443a-41bd-e414-f6ad-e58d267f4e95', 'Clove': '1dbf2edd-4729-0984-3115-daa5eed44993',
      'Tejo': 'b444168c-4e35-8076-db47-ef9bf368f384', 'Vyse': 'efba5359-4016-a1e5-7626-b1ae76895940',
      'Waylay': 'df1cb487-4902-002e-5c17-d28e83e78588'
  };

  const rankImages = {
      'Iron 1': '3.png', 'Iron 2': '4.png', 'Iron 3': '5.png',
      'Bronze 1': '6.png', 'Bronze 2': '7.png', 'Bronze 3': '8.png',
      'Silver 1': '9.png', 'Silver 2': '10.png', 'Silver 3': '11.png',
      'Gold 1': '12.png', 'Gold 2': '13.png', 'Gold 3': '14.png',
      'Platinum 1': '15.png', 'Platinum 2': '16.png', 'Platinum 3': '17.png',
      'Diamond 1': '18.png', 'Diamond 2': '19.png', 'Diamond 3': '20.png',
      'Ascendant 1': '21.png', 'Ascendant 2': '22.png', 'Ascendant 3': '23.png',
      'Immortal 1': '24.png', 'Immortal 2': '25.png', 'Immortal 3': '26.png',
      'Radiant': '27.png', 'Unranked': '0.png'
  };

  // Initialize
  initOverlay();
  
  // Calculate daily wins/losses using UNIX timestamp
  function calculateDailyWL(matches) {
      const todayDateString = new Date().toISOString().split('T')[0];
      
      let dailyWins = 0;
      let dailyLosses = 0;

      matches.forEach(match => {
          // Multiply by 1000 because timestamp is in seconds
          const matchDate = new Date(match.timestamp * 1000); 
          const matchDateString = matchDate.toISOString().split('T')[0];
          
          if (matchDateString === todayDateString) {
              if (match.result === 'Victory') dailyWins++;
              else if (match.result === 'Defeat') dailyLosses++;
          }
      });

      return `${dailyWins}-${dailyLosses}`;
  }
  
  function calculateHeadshotPercentage(headshots, bodyshots, legshots) {
      const totalHits = headshots + bodyshots + legshots;
      if (totalHits === 0) return 0;
      return (headshots / totalHits * 100).toFixed(1);
  }
    
  // Fetch matches from local API instead of Supabase
  async function fetchMatches() {
      try {
          if(!player.region || player.name === 'Player') {
            agentsRow.innerHTML = `<div class="error-message">Missing URL Parameters</div>`;
            return;
          }

          const query = `?region=${encodeURIComponent(player.region)}&name=${encodeURIComponent(player.name)}&tag=${encodeURIComponent(player.tag)}`;
          const response = await fetch(`/api/stats${query}`);
          const data = await response.json();

          if (!data.matches || data.matches.length === 0) {
              throw new Error('No matches found');
          }
          
          renderAgentPortraits(data.matches);
          calculateStats(data.matches);
          
          // Use the rank from the most recent match
          updateMMR(data.matches[0].rank);
          rankSubtitle.textContent = `${data.matches.length} matches`;

      } catch (error) {
          console.error('Error fetching matches:', error);
          agentsRow.innerHTML = `<div class="error-message">${error.message || 'Match data error'}</div>`;
      }
  }

  function updateMMR(rankNameValue) {
      rankNameValue = rankNameValue || 'Unranked';
      rankName.textContent = rankNameValue;
      
      const fileName = rankImages[rankNameValue] || rankImages['Unranked'];
      rankIcon.src = `https://trackercdn.com/cdn/tracker.gg/valorant/icons/tiersv2/${fileName}`;
      rankIcon.alt = `${rankNameValue} Rank`;
  }
    
  function renderAgentPortraits(matches) {
      agentsRow.innerHTML = '';
      const agentsToShow = matches.slice(0, maxAgentsToShow);
      
      agentsToShow.forEach(match => {
          const agentPortrait = document.createElement('div');
          agentPortrait.className = 'agent-portrait';
          const uuid = agentUUIDs[match.agent] || 'displayicon';
          
          let barClass = 'draw-bar';
          if(match.result === 'Victory') barClass = 'win-bar';
          if(match.result === 'Defeat') barClass = 'loss-bar';

          agentPortrait.innerHTML = `
              <div class="agent-icon">
                  <img src="https://media.valorant-api.com/agents/${uuid}/displayicon.png" 
                       alt="${match.agent}"
                       onerror="this.onerror=null;this.src='https://media.valorant-api.com/agents/displayicon.png'">
              </div>
              <div class="match-result-bar ${barClass}"></div>
          `;
          agentsRow.appendChild(agentPortrait);
      });
  }
  
  function calculateStats(matches) {
      if (!matches.length) return;
      
      const wins = matches.filter(m => m.result === 'Victory').length;
      const winRateValue = ((wins / matches.length) * 100).toFixed(1);
      
      let totalKills = 0, totalDeaths = 0;
      let totalHeadshots = 0, totalBodyshots = 0, totalLegshots = 0;
      
      matches.forEach(match => {
          totalKills += Number(match.kills || 0);
          totalDeaths += Number(match.deaths || 0);
          totalHeadshots += Number(match.headshots || 0);
          totalBodyshots += Number(match.bodyshots || 0);
          totalLegshots += Number(match.legshots || 0);
      });
      
      const kdValue = totalDeaths > 0 ? (totalKills / totalDeaths).toFixed(2) : totalKills.toFixed(2);
      
      winRate.textContent = `${winRateValue}%`;
      kdRatio.textContent = kdValue;
      hsPercentage.textContent = `${calculateHeadshotPercentage(totalHeadshots, totalBodyshots, totalLegshots)}%`;
      dailyWL.textContent = calculateDailyWL(matches);
  }
  
  function rotateStats() {
      document.querySelector(`.set-${currentStatSet}`).classList.remove('active');
      document.querySelector(`.set-${currentStatSet}`).classList.add('inactive');
      document.querySelector(`.indicator-dot[data-set="${currentStatSet}"]`).classList.remove('active');
      
      currentStatSet = currentStatSet === 1 ? 2 : 1;
      
      document.querySelector(`.set-${currentStatSet}`).classList.remove('inactive');
      document.querySelector(`.set-${currentStatSet}`).classList.add('active');
      document.querySelector(`.indicator-dot[data-set="${currentStatSet}"]`).classList.add('active');
  }

  async function updateMessageDisplay() {
      try {
          const response = await fetch('/api/message');
          const data = await response.json();
          const message = data.message;
          
          if (message && message.trim() !== "") {
              messageContainer.textContent = message;
              messageContainer.classList.add('has-message');
              messageContainer.style.display = 'flex';
          } else {
              messageContainer.classList.remove('has-message');
              messageContainer.style.display = 'none';
          }
      } catch (error) {
          messageContainer.innerHTML = `<div class="error-message">Message error</div>`;
      }
  }

  async function initOverlay() {
      const rotationSpeed = parseInt(urlParams.get('rotation') || '60000');
      statRotationInterval = setInterval(rotateStats, rotationSpeed);
      
      document.querySelectorAll('.indicator-dot').forEach(dot => {
          dot.addEventListener('click', () => {
              clearInterval(statRotationInterval);
              const setNum = parseInt(dot.dataset.set);
              if (setNum !== currentStatSet) rotateStats();
              statRotationInterval = setInterval(rotateStats, rotationSpeed);
          });
      });
      
      await fetchMatches();
      await updateMessageDisplay();
      
      setInterval(fetchMatches, 300000); // 5 min
      setInterval(updateMessageDisplay, 30000); // 30 sec
  }
</script>
</body>
</html>
